<h2 mat-dialog-title>Hi {{data.name}}</h2>
<mat-dialog-content>
  <p>What's your favorite animal?</p>
  <mat-form-field>
    <mat-label>Favorite Animal</mat-label>
    <input matInput #animal />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close>No Thanks</button>
  <button matButton [mat-dialog-close]="animal.value" cdkFocusInitial>Ok</button>
</mat-dialog-actions>
