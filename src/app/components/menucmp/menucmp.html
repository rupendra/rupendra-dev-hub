<div class="container pt-5">
  <div class="row">
    <div class="col md-12">
      <h4>Menu exmaples</h4>
      <div class="row">
        <div class="col-md-4">
          <h6>Normal Menu</h6>
          <button matButton [matMenuTriggerFor]="menu">Menu</button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item>
              <mat-icon>dialpad</mat-icon> Item 1
            </button>
            <button mat-menu-item>Item 2</button>
          </mat-menu>
        </div>
        <div class="col-md-4">
          <h6>user menu</h6>
          <button matButton [matMenuTriggerFor]="menu1">user pfofile</button>
          <mat-menu #menu1="matMenu">
            <button mat-menu-item>profile</button>
            <button mat-menu-item>logout</button>
          </mat-menu>
        </div>
        <div class="col-md-4">
          <h6>Nested menu</h6>
          <button matButton [matMenuTriggerFor]="animals">choose veg</button>
          <mat-menu #animals="matMenu">
            <button mat-menu-item [matMenuTriggerFor]="vertebrates">Vertebrates</button>
            <button mat-menu-item>Invertebrates</button>
          </mat-menu>

          <mat-menu #vertebrates="matMenu">
            <button mat-menu-item>Fishes</button>
            <button mat-menu-item>Amphibians</button>
            <button mat-menu-item>Reptiles</button>
            <button mat-menu-item>Birds</button>
            <button mat-menu-item>Mammals</button>
          </mat-menu>
        </div>

      </div>
    </div>
  </div>
</div>
