<div class="container pt-4">
        <h4>Components</h4>
        <mat-divider></mat-divider>
        <div class="content pt-2">
            <div class="row">
                @for (item of cards; track $index) {
                      <div class="col-2">
                    <mat-card>
                    <div class="card-content">
                            <mat-icon>{{item.icon}}</mat-icon>
                           <span>{{item.title}}</span>
                    </div>
                    </mat-card>
                </div>
                }               
            </div>
        </div>
</div>
